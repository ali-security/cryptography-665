name: linkcheck
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-linkcheck:
    runs-on: ubuntu-22.04
    name: linkcheck
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v2.3.4
        with:
          persist-credentials: false
      - name: Setup python
        uses: MatteoH2O1999/setup-python@v4
        with:
          python-version: 3.9
      - uses: actions-rs/toolchain@v1.0.7
        with:
          profile: minimal
          toolchain: stable
          override: true
          default: true
      - run: python -m pip install -U tox
      - run: tox -r --  --color=yes
        env:
          TOXENV: docs-linkcheck
